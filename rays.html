    <style>

        body {
            font-family: Arial;
            margin: 0px;
            height: 1200px;
        }
        .home {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            background-color: green;
            height: 75px;
            width: 2100px;
            margin: 0px;
            margin-bottom: 150px;
        }

        .links {
            display: flex;

        }

            margin-right: 10px;
        }

            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .social-link {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }

        .h-title {
            display: flex;
            color: white;
            margin-left: 75px;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            row-gap: 55px;
        }

        .card {
            background-color: green;
            width: 275px;
            height: 320px;
            margin-left: 75px;
        }

        .pics {
            width: 275px;
            height: 250px;
        }

        .clothing-title,.price {
            margin: 5px;
            color: white;
        }

        .add-to-cart {
            width: 275px;
            height: 50px;
            border: 2px solid green;
            font-size: 20px;
            color: green;
            cursor: pointer;
        }

        .contact {
            display: flex;
            justify-content: center;
            margin-top: 335px;
        }

        .g-link {
            color: black;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 10px;
        }

</head>
